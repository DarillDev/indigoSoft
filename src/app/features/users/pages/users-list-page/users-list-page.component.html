<div class="users-list-page">
  <div class="users-list-page__toolbar">
    <input
      class="users-list-page__search"
      type="text"
      placeholder="Поиск по имени..."
      [formControl]="searchControl"
    />
  </div>

  @if (isLoading()) {
    <p class="users-list-page__state">Загрузка...</p>
  } @else if (!filteredUsers().length) {
    <p class="users-list-page__state">
      {{ hasFilter() ? 'Ничего не найдено по заданным фильтрам' : 'Пользователи не найдены' }}
    </p>
  } @else {
    <div class="users-list-page__list">
      @for (user of filteredUsers(); track user.id) {
        <feature-user-card [user]="user" (onEditButtonClick)="editUser(user)" />
      }
    </div>
  }
</div>
