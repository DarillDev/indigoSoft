<ui-kit-card>
  <div class="user-card">
    <div class="user-card__header">
      <div class="user-card__avatar">{{ user().name[0] }}</div>
      <div class="user-card__title">
        <h3 class="user-card__name">{{ user().name }}</h3>
        <span class="user-card__role user-card__role--{{ user().role }}">{{ user().role }}</span>
      </div>
    </div>

    <div class="user-card__body">
      <div class="user-card__row">
        <span class="user-card__label">Email</span>
        <a class="user-card__value user-card__link" href="mailto:{{ user().email }}">{{
          user().email
        }}</a>
      </div>

      @if (user().age !== null) {
        <div class="user-card__row">
          <span class="user-card__label">Возраст</span>
          <span class="user-card__value">{{ user().age }}</span>
        </div>
      }

      <div class="user-card__row">
        <span class="user-card__label">Адрес</span>
        <span class="user-card__value">{{ user().address.street }}, {{ user().address.city }}</span>
      </div>
    </div>
  </div>

  <div class="user-card__footer">
    <button class="user-card__edit-btn" type="button" (click)="onEditButtonClick.emit()">
      Edit
    </button>
  </div>
</ui-kit-card>
