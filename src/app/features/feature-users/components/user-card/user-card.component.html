<ds-card>
  <div class="user-card">
    <div class="user-card__header">
      <div class="user-card__avatar user-card__avatar--{{ avatarColor() }}">
        {{ user().name[0] }}
      </div>

      <div class="user-card__title">
        <h3 class="user-card__name">{{ user().name }}</h3>
        <span class="user-card__role user-card__role--{{ user().role }}">{{ user().role }}</span>
      </div>

      <button
        class="user-card__edit-btn"
        type="button"
        aria-label="Edit user"
        (click)="editButtonClick.emit()"
      >
        <ds-icon name="edit" [size]="14" />
      </button>
    </div>

    <div class="user-card__body">
      <div class="user-card__row">
        <ds-icon class="user-card__icon" name="mail" [size]="14" />
        <a class="user-card__link" href="mailto:{{ user().email }}">{{ user().email }}</a>
      </div>

      <div class="user-card__row">
        <ds-icon class="user-card__icon" name="location" [size]="14" />
        <span class="user-card__value">{{ user().address.street }}, {{ user().address.city }}</span>
      </div>

      @if (user().age !== null) {
        <div class="user-card__row">
          <ds-icon class="user-card__icon" name="calendar" [size]="14" />
          <span class="user-card__value">{{ user().age ?? '??' }}</span>
        </div>
      }
    </div>
  </div>
</ds-card>
