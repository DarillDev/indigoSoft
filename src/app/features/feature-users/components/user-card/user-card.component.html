<ds-card>
  <div class="user-card">
    <div class="user-card__header">
      <div class="user-card__avatar user-card__avatar--{{ avatarColor() }}">
        {{ user().name[0] }}
      </div>
      <div class="user-card__title">
        <h3 class="user-card__name">{{ user().name }}</h3>
        <span class="user-card__role user-card__role--{{ user().role }}">{{ user().role }}</span>
      </div>
      <button class="user-card__edit-btn" type="button" aria-label="Edit user" (click)="onEditButtonClick.emit()">
        <svg width="14" height="14" viewBox="0 0 16 16" fill="none">
          <path d="M11.5 2.5l2 2-8 8H3.5v-2l8-8z" stroke="currentColor" stroke-width="1.5" stroke-linejoin="round"/>
          <path d="M10 4l2 2" stroke="currentColor" stroke-width="1.5"/>
        </svg>
      </button>
    </div>

    <div class="user-card__body">
      <div class="user-card__row">
        <svg class="user-card__icon" width="14" height="14" viewBox="0 0 16 16" fill="none">
          <rect x="2" y="3" width="12" height="10" rx="1.5" stroke="currentColor" stroke-width="1.5"/>
          <path d="M2 6l6 4 6-4" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
        <a class="user-card__link" href="mailto:{{ user().email }}">{{ user().email }}</a>
      </div>

      <div class="user-card__row">
        <svg class="user-card__icon" width="14" height="14" viewBox="0 0 16 16" fill="none">
          <path d="M8 1.5C5.515 1.5 3.5 3.515 3.5 6c0 3.75 4.5 8.5 4.5 8.5S12.5 9.75 12.5 6c0-2.485-2.015-4.5-4.5-4.5z" stroke="currentColor" stroke-width="1.5"/>
          <circle cx="8" cy="6" r="1.5" stroke="currentColor" stroke-width="1.5"/>
        </svg>
        <span class="user-card__value">{{ user().address.street }}, {{ user().address.city }}</span>
      </div>

      @if (user().age !== null) {
        <div class="user-card__row">
          <svg class="user-card__icon" width="14" height="14" viewBox="0 0 16 16" fill="none">
            <rect x="2" y="3" width="12" height="11" rx="2" stroke="currentColor" stroke-width="1.5"/>
            <path d="M5 1v3M11 1v3M2 7h12" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
          </svg>
          <span class="user-card__value">{{ user().age }}</span>
        </div>
      }
    </div>
  </div>
</ds-card>
