<ui-kit-form-field>
  @if (label(); as label) {
    <label [id]="id()">{{ label }}</label>
  }

  <span class="search-icon" uiKitPrefix>
    <ds-icon name="search" [size]="16" />
  </span>

  <input
    uiKitInput
    [id]="id()"
    [type]="type()"
    [placeholder]="placeholder()"
    [value]="value()"
    [disabled]="isDisabled()"
    (input)="onValueChange($event)"
    (blur)="onBlur()"
  />
</ui-kit-form-field>
