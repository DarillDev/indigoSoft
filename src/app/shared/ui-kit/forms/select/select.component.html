@if (label()) {
  <label class="ui-kit-select__label">{{ label() }}</label>
}
<div class="ui-kit-select__wrapper">
  <select
    class="ui-kit-select__field"
    [disabled]="isDisabled()"
    (change)="handleChange($event)"
    (blur)="handleBlur()"
  >
    <option value="" disabled [selected]="value() === null">
      {{ placeholder() || 'Select...' }}
    </option>
    @for (option of options(); track option.value) {
      <option [selected]="isSelected(option.value)">{{ option.label }}</option>
    }
  </select>
  <span class="ui-kit-select__arrow">
    <svg width="12" height="12" viewBox="0 0 12 12" fill="none">
      <path d="M2 4l4 4 4-4" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </svg>
  </span>
</div>
